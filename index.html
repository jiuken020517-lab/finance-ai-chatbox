<!DOCTYPE html>
<html>
<head>
  <title>Finance AI Chatbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea,
    input,
    select {
      width: 100%;
      font-size: 16px;
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box;
    }

    textarea {
      height: 100px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #chat {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .ai {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    code {
      background: #f5f5f5;
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Finance AI Chatbox</h1>

  <textarea id="message" placeholder="Ask a finance question..."></textarea>
  <br>

  <button onclick="sendMessage()">Send</button>
  <button onclick="clearChat()">Clear Chat</button>
  <button onclick="insertCalculatorTemplate()">Finance Calculator</button>

  <hr>

  <h2>Black-Scholes Calculator</h2>

  <label><b>Stock Price (S)</b></label>
  <input id="bsS" placeholder="Example: 300" value="300">

  <label><b>Strike Price (K)</b></label>
  <input id="bsK" placeholder="Example: 280" value="280">

  <label><b>Risk-free Rate (r)</b></label>
  <input id="bsR" placeholder="Example: 0.03" value="0.03">

  <label><b>Implied Volatility (IV)</b></label>
  <input id="bsIV" placeholder="Example: 0.25" value="0.25">

  <label><b>Time to Expiry (T)</b></label>
  <input id="bsT" placeholder="Example: 0.10" value="0.10">

  <label><b>Market Price</b></label>
  <input id="bsMarket" placeholder="Example: 25" value="25">

  <select id="bsType">
    <option value="call">Call</option>
    <option value="put">Put</option>
  </select>

  <button onclick="calculateBS()">Calculate Black-Scholes</button>

  <div id="bsResult"></div>

  <hr>

  <div id="chat"></div>

  <script>
    let conversation = [];

    window.onload = function () {
      document.getElementById("message").addEventListener("keydown", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    };

    function scrollToBottom() {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    }

    function clearChat() {
      if (!confirm("Clear all chat history?")) {
        return;
      }

      document.getElementById("chat").innerHTML = "";
      conversation = [];
    }

    function insertCalculatorTemplate() {
      document.getElementById("message").value =
`Calculate Black-Scholes Option

Option Type: Call
Stock Price S = 300
Strike Price K = 280
Risk-free Rate r = 0.03
Implied Volatility IV = 0.25
Time to Expiry T = 0.10
Market Price = 25

Please calculate:
1. Black-Scholes model price
2. d1 and d2
3. Delta
4. Gamma
5. Vega
6. Theta
7. Intrinsic value
8. Time value
9. Moneyness
10. Interpretation`;
    }

    function normCDF(x) {
      return 0.5 * (1 + erf(x / Math.sqrt(2)));
    }

    function normPDF(x) {
      return Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
    }

    function erf(x) {
      const sign = x >= 0 ? 1 : -1;
      x = Math.abs(x);

      const a1 = 0.254829592;
      const a2 = -0.284496736;
      const a3 = 1.421413741;
      const a4 = -1.453152027;
      const a5 = 1.061405429;
      const p = 0.3275911;

      const t = 1 / (1 + p * x);
      const y =
        1 -
        (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) *
          t *
          Math.exp(-x * x);

      return sign * y;
    }

    function calculateBS() {
      const S = Number(document.getElementById("bsS").value);
      const K = Number(document.getElementById("bsK").value);
      const r = Number(document.getElementById("bsR").value);
      const sigma = Number(document.getElementById("bsIV").value);
      const T = Number(document.getElementById("bsT").value);
      const marketPrice = Number(document.getElementById("bsMarket").value);
      const type = document.getElementById("bsType").value;

      if (S <= 0 || K <= 0 || sigma <= 0 || T <= 0) {
        document.getElementById("bsResult").innerHTML =
          "<p>Please enter valid positive values for S, K, IV, and T.</p>";
        return;
      }

      const d1 =
        (Math.log(S / K) + (r + 0.5 * sigma * sigma) * T) /
        (sigma * Math.sqrt(T));

      const d2 = d1 - sigma * Math.sqrt(T);

      const callPrice =
        S * normCDF(d1) -
        K * Math.exp(-r * T) * normCDF(d2);

      const putPrice =
        K * Math.exp(-r * T) * normCDF(-d2) -
        S * normCDF(-d1);

      const price = type === "call" ? callPrice : putPrice;
      const delta = type === "call" ? normCDF(d1) : normCDF(d1) - 1;
      const gamma = normPDF(d1) / (S * sigma * Math.sqrt(T));
      const vega = S * normPDF(d1) * Math.sqrt(T);

      const thetaCall =
        -(S * normPDF(d1) * sigma) / (2 * Math.sqrt(T)) -
        r * K * Math.exp(-r * T) * normCDF(d2);

      const thetaPut =
        -(S * normPDF(d1) * sigma) / (2 * Math.sqrt(T)) +
        r * K * Math.exp(-r * T) * normCDF(-d2);

      const theta = type === "call" ? thetaCall : thetaPut;

      const intrinsic =
        type === "call" ? Math.max(S - K, 0) : Math.max(K - S, 0);

      const timeValue = price - intrinsic;

      const mispricing = marketPrice - price;

      let valuationStatus = "Fairly Priced";
      if (mispricing > 0) {
        valuationStatus = "Overpriced";
      } else if (mispricing < 0) {
        valuationStatus = "Underpriced";
      }

      let moneyness = "ATM";
      if (type === "call") {
        if (S > K) moneyness = "ITM";
        if (S < K) moneyness = "OTM";
      } else {
        if (S < K) moneyness = "ITM";
        if (S > K) moneyness = "OTM";
      }

      document.getElementById("bsResult").innerHTML = `
        <h3>Result</h3>
        <table>
          <tr><th>Metric</th><th>Value</th></tr>
          <tr><td>Option Type</td><td>${type.toUpperCase()}</td></tr>
          <tr><td>Model Price</td><td>${price.toFixed(4)}</td></tr>
          <tr><td>Market Price</td><td>${marketPrice.toFixed(4)}</td></tr>
          <tr><td>Mispricing</td><td>${mispricing.toFixed(4)}</td></tr>
          <tr><td>Valuation Status</td><td>${valuationStatus}</td></tr>
          <tr><td>d1</td><td>${d1.toFixed(4)}</td></tr>
          <tr><td>d2</td><td>${d2.toFixed(4)}</td></tr>
          <tr><td>Delta</td><td>${delta.toFixed(4)}</td></tr>
          <tr><td>Gamma</td><td>${gamma.toFixed(6)}</td></tr>
          <tr><td>Vega</td><td>${vega.toFixed(4)}</td></tr>
          <tr><td>Theta Annual</td><td>${theta.toFixed(4)}</td></tr>
          <tr><td>Theta Daily</td><td>${(theta / 365).toFixed(4)}</td></tr>
          <tr><td>Intrinsic Value</td><td>${intrinsic.toFixed(4)}</td></tr>
          <tr><td>Time Value</td><td>${timeValue.toFixed(4)}</td></tr>
          <tr><td>Moneyness</td><td>${moneyness}</td></tr>
        </table>
      `;
    }

    async function sendMessage() {
      const messageBox = document.getElementById("message");
      const chatBox = document.getElementById("chat");
      const message = messageBox.value.trim();

      if (!message) return;

      conversation.push({
        role: "user",
        content: message
      });

      chatBox.innerHTML += `<div class="user"><strong>You:</strong><br>${message}</div>`;
      messageBox.value = "";
      scrollToBottom();

      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `<div class="ai" id="${loadingId}"><strong>AI:</strong><br>Loading...</div>`;
      scrollToBottom();

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await response.json();
      const aiReply = data.reply || data.error || "No reply";

      conversation.push({
        role: "assistant",
        content: aiReply
      });

      document.getElementById(loadingId).innerHTML =
        `<strong>AI:</strong><br>${marked.parse(aiReply)}`;

      scrollToBottom();
    }
  </script>
</body>
</html>
