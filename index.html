<!DOCTYPE html>
<html>
<head>
  <title>Finance AI Chatbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #reply {
      margin-top: 20px;
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h1>Finance AI Chatbox</h1>

  <textarea id="message" placeholder="Ask a finance question..."></textarea>
  <br>

  <button onclick="sendMessage()">Send</button>

  <div id="reply"></div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value;
      const replyBox = document.getElementById("reply");

      replyBox.innerText = "Loading...";

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await response.json();

      replyBox.innerText = data.reply || data.error || "No reply";
    }
  </script>
</body>
</html>
