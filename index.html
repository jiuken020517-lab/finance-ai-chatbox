<!DOCTYPE html>
<html>
<head>
  <title>Finance AI Chatbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #chat {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .ai {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    code {
      background: #f5f5f5;
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <h1>Finance AI Chatbox</h1>

  <textarea id="message" placeholder="Ask a finance question..."></textarea>
  <br>

  <button onclick="sendMessage()">Send</button>
  <button onclick="clearChat()">Clear Chat</button>
  <button onclick="insertCalculatorTemplate()">Finance Calculator</button>

  <div id="chat"></div>

  <script>
    let conversation = [];

    window.onload = function () {
      document.getElementById("message").addEventListener("keydown", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    };

    function scrollToBottom() {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    }

    function clearChat() {
      if (!confirm("Clear all chat history?")) {
        return;
      }

      document.getElementById("chat").innerHTML = "";
      conversation = [];
    }

    function insertCalculatorTemplate() {
      document.getElementById("message").value =
`Calculate Black-Scholes Option

Option Type: Call
Stock Price S = 300
Strike Price K = 280
Risk-free Rate r = 0.03
Implied Volatility IV = 0.25
Time to Expiry T = 0.10
Market Price = 25

Please calculate:
1. Black-Scholes model price
2. d1 and d2
3. Delta
4. Gamma
5. Vega
6. Theta
7. Intrinsic value
8. Time value
9. Moneyness
10. Interpretation`;
    }

    async function sendMessage() {
      const messageBox = document.getElementById("message");
      const chatBox = document.getElementById("chat");
      const message = messageBox.value.trim();

      if (!message) return;

      conversation.push({
        role: "user",
        content: message
      });

      chatBox.innerHTML += `<div class="user"><strong>You:</strong><br>${message}</div>`;
      messageBox.value = "";
      scrollToBottom();

      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `<div class="ai" id="${loadingId}"><strong>AI:</strong><br>Loading...</div>`;
      scrollToBottom();

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await response.json();
      const aiReply = data.reply || data.error || "No reply";

      conversation.push({
        role: "assistant",
        content: aiReply
      });

      document.getElementById(loadingId).innerHTML =
        `<strong>AI:</strong><br>${marked.parse(aiReply)}`;

      scrollToBottom();
    }
  </script>
</body>
</html>
