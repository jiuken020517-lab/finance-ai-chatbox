<!DOCTYPE html>
<html>
<head>
  <title>Finance AI Chatbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #chat {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .ai {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <h1>Finance AI Chatbox</h1>

  <textarea id="message" placeholder="Ask a finance question..."></textarea>
  <br>

  <button onclick="sendMessage()">Send</button>
  <button onclick="clearChat()">Clear Chat</button>

  <div id="chat"></div>

  <script>
    let conversation = [];

    window.onload = function () {
      document.getElementById("message").addEventListener("keydown", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    };

    function scrollToBottom() {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    }
     function clearChat() {

  if (!confirm("Clear all chat history?")) {
    return;
  }

  document.getElementById("chat").innerHTML = "";

  conversation = [];

}


    async function sendMessage() {
      const messageBox = document.getElementById("message");
      const chatBox = document.getElementById("chat");
      const message = messageBox.value.trim();

      if (!message) return;

      conversation.push({
        role: "user",
        content: message
      });

      chatBox.innerHTML += `<div class="user"><strong>You:</strong><br>${message}</div>`;
      messageBox.value = "";
      scrollToBottom();

      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `<div class="ai" id="${loadingId}"><strong>AI:</strong><br>Loading...</div>`;
      scrollToBottom();

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await response.json();
      const aiReply = data.reply || data.error || "No reply";

      conversation.push({
        role: "assistant",
        content: aiReply
      });

      document.getElementById(loadingId).innerHTML =
        `<strong>AI:</strong><br>${aiReply}`;

      scrollToBottom();
    }
  </script>
</body>
</html>
