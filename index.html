<!DOCTYPE html>
<html>
<head>
  <title>Finance AI Chatbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea,
    input,
    select {
      width: 100%;
      font-size: 16px;
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box;
    }

    textarea {
      height: 100px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #chat {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .ai {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #f4f4f4;
    }

    code {
      background: #f5f5f5;
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <h1>Finance AI Chatbox</h1>

  <button onclick="showSection('chatSection')">Chat Mode</button>
  <button onclick="showSection('bsSection')">Black-Scholes Calculator</button>
  <button onclick="showSection('pnlSection')">Option P&L</button>

  <hr>

  <div id="chatSection">
    <textarea id="message" placeholder="Ask a finance question..."></textarea>
    <br>

    <button onclick="sendMessage()">Send</button>
    <button onclick="clearChat()">Clear Chat</button>
    <button onclick="insertCalculatorTemplate()">Finance Calculator Template</button>

    <div id="chat"></div>
  </div>

  <div id="bsSection" style="display:none;">
    <h2>Black-Scholes Calculator</h2>

    <label>Stock Price (S)</label>
    <input id="bsS" value="300">

    <label>Strike Price (K)</label>
    <input id="bsK" value="280">

    <label>Risk-Free Rate (r)</label>
    <input id="bsR" value="0.03">

    <label>Implied Volatility (IV)</label>
    <input id="bsIV" value="0.25">

    <label>Time to Expiry (T in years)</label>
    <input id="bsT" value="0.10">

    <label>Market Price</label>
    <input id="bsMarket" value="25">

    <label>Option Type</label>
    <select id="bsType">
      <option value="call">Call</option>
      <option value="put">Put</option>
    </select>

    <button onclick="calculateBS()">Calculate Black-Scholes</button>
    <button onclick="calculateIV()">Calculate IV</button>

    <div id="bsResult"></div>
    <div id="pnlSection" style="display:none;">

  <h2>Option P&L Analyzer</h2>

  <label>Entry Price</label>
  <input id="entryPrice" value="21.70">

  <label>Current Price</label>
  <input id="currentPrice" value="25.40">

  <label>Contracts</label>
  <input id="contracts" value="3">

  <label>Multiplier</label>
  <input id="multiplier" value="100">

  <button onclick="calculatePnL()">Calculate P&L</button>

  <div id="pnlResult"></div>


  </div>

  <script>
    let conversation = [];

    window.onload = function () {
      document.getElementById("message").addEventListener("keydown", function(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    };

    function showSection(sectionId) {
      document.getElementById("chatSection").style.display = "none";
      document.getElementById("bsSection").style.display = "none";
      document.getElementById("pnlSection").style.display = "none";
      document.getElementById(sectionId).style.display = "block";
    }

    function scrollToBottom() {
      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    }

    function clearChat() {
      if (!confirm("Clear all chat history?")) {
        return;
      }

      document.getElementById("chat").innerHTML = "";
      conversation = [];
    }

    function insertCalculatorTemplate() {
      document.getElementById("message").value =
`Calculate Black-Scholes Option

Option Type: Call
Stock Price S = 300
Strike Price K = 280
Risk-free Rate r = 0.03
Implied Volatility IV = 0.25
Time to Expiry T = 0.10
Market Price = 25

Please calculate:
1. Black-Scholes model price
2. d1 and d2
3. Delta
4. Gamma
5. Vega
6. Theta
7. Intrinsic value
8. Time value
9. Moneyness
10. Interpretation`;
    }

    function normCDF(x) {
      return 0.5 * (1 + erf(x / Math.sqrt(2)));
    }

    function normPDF(x) {
      return Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI);
    }

    function erf(x) {
      const sign = x >= 0 ? 1 : -1;
      x = Math.abs(x);

      const a1 = 0.254829592;
      const a2 = -0.284496736;
      const a3 = 1.421413741;
      const a4 = -1.453152027;
      const a5 = 1.061405429;
      const p = 0.3275911;

      const t = 1 / (1 + p * x);
      const y =
        1 -
        (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) *
          t *
          Math.exp(-x * x);

      return sign * y;
    }

    function calculateBS() {
      const S = Number(document.getElementById("bsS").value);
      const K = Number(document.getElementById("bsK").value);
      const r = Number(document.getElementById("bsR").value);
      const sigma = Number(document.getElementById("bsIV").value);
      const T = Number(document.getElementById("bsT").value);
      const marketPrice = Number(document.getElementById("bsMarket").value);
      const type = document.getElementById("bsType").value;

      if (S <= 0 || K <= 0 || sigma <= 0 || T <= 0) {
        document.getElementById("bsResult").innerHTML =
          "<p>Please enter valid positive values for S, K, IV, and T.</p>";
        return;
      }

      const d1 =
        (Math.log(S / K) + (r + 0.5 * sigma * sigma) * T) /
        (sigma * Math.sqrt(T));

      const d2 = d1 - sigma * Math.sqrt(T);

      const callPrice =
        S * normCDF(d1) -
        K * Math.exp(-r * T) * normCDF(d2);

      const putPrice =
        K * Math.exp(-r * T) * normCDF(-d2) -
        S * normCDF(-d1);

      const price = type === "call" ? callPrice : putPrice;
      const delta = type === "call" ? normCDF(d1) : normCDF(d1) - 1;
      const gamma = normPDF(d1) / (S * sigma * Math.sqrt(T));
      const vega = S * normPDF(d1) * Math.sqrt(T);

      const thetaCall =
        -(S * normPDF(d1) * sigma) / (2 * Math.sqrt(T)) -
        r * K * Math.exp(-r * T) * normCDF(d2);

      const thetaPut =
        -(S * normPDF(d1) * sigma) / (2 * Math.sqrt(T)) +
        r * K * Math.exp(-r * T) * normCDF(-d2);

      const theta = type === "call" ? thetaCall : thetaPut;

      const intrinsic =
        type === "call" ? Math.max(S - K, 0) : Math.max(K - S, 0);

      const timeValue = price - intrinsic;
      const mispricing = marketPrice - price;

      let valuationStatus = "Fairly Priced";

      if (mispricing > 0) {
        valuationStatus = "Overvalued";
      }

      if (mispricing < 0) {
        valuationStatus = "Undervalued";
      }

      let moneyness = "ATM";

      if (type === "call") {
        if (S > K) moneyness = "ITM";
        if (S < K) moneyness = "OTM";
      } else {
        if (S < K) moneyness = "ITM";
        if (S > K) moneyness = "OTM";
      }

      document.getElementById("bsResult").innerHTML = `
        <h3>Result</h3>
        <table>
          <tr><th>Metric</th><th>Value</th></tr>
          <tr><td>Option Type</td><td>${type.toUpperCase()}</td></tr>
          <tr><td>Model Price</td><td>${price.toFixed(4)}</td></tr>
          <tr><td>Market Price</td><td>${marketPrice.toFixed(4)}</td></tr>
          <tr><td>Mispricing</td><td>${mispricing.toFixed(4)}</td></tr>
          <tr><td>Valuation Status</td><td>${valuationStatus}</td></tr>
          <tr><td>d1</td><td>${d1.toFixed(4)}</td></tr>
          <tr><td>d2</td><td>${d2.toFixed(4)}</td></tr>
          <tr><td>Delta</td><td>${delta.toFixed(4)}</td></tr>
          <tr><td>Gamma</td><td>${gamma.toFixed(6)}</td></tr>
          <tr><td>Vega</td><td>${vega.toFixed(4)}</td></tr>
          <tr><td>Theta Annual</td><td>${theta.toFixed(4)}</td></tr>
          <tr><td>Theta Daily</td><td>${(theta / 365).toFixed(4)}</td></tr>
          <tr><td>Intrinsic Value</td><td>${intrinsic.toFixed(4)}</td></tr>
          <tr><td>Time Value</td><td>${timeValue.toFixed(4)}</td></tr>
          <tr><td>Moneyness</td><td>${moneyness}</td></tr>
        </table>
      `;
    }
    function bsPriceWithIV(S, K, r, T, sigma, type) {
  const d1 =
    (Math.log(S / K) + (r + 0.5 * sigma * sigma) * T) /
    (sigma * Math.sqrt(T));

  const d2 = d1 - sigma * Math.sqrt(T);

  if (type === "call") {
    return S * normCDF(d1) - K * Math.exp(-r * T) * normCDF(d2);
  } else {
    return K * Math.exp(-r * T) * normCDF(-d2) - S * normCDF(-d1);
  }
}

function calculateIV() {
  const S = Number(document.getElementById("bsS").value);
  const K = Number(document.getElementById("bsK").value);
  const r = Number(document.getElementById("bsR").value);
  const T = Number(document.getElementById("bsT").value);
  const marketPrice = Number(document.getElementById("bsMarket").value);
  const type = document.getElementById("bsType").value;

  if (S <= 0 || K <= 0 || T <= 0 || marketPrice <= 0) {
    document.getElementById("bsResult").innerHTML =
      "<p>Please enter valid positive values for S, K, T, and Market Price.</p>";
    return;
  }

  let low = 0.0001;
  let high = 5.0;
  let mid = 0;

  for (let i = 0; i < 100; i++) {
    mid = (low + high) / 2;

    const modelPrice = bsPriceWithIV(S, K, r, T, mid, type);

    if (modelPrice > marketPrice) {
      high = mid;
    } else {
      low = mid;
    }
  }

  const impliedVol = mid;
  const finalPrice = bsPriceWithIV(S, K, r, T, impliedVol, type);

  document.getElementById("bsResult").innerHTML = `
    <h3>Implied Volatility Solver Result</h3>
    <table>
      <tr><th>Metric</th><th>Value</th></tr>
      <tr><td>Option Type</td><td>${type.toUpperCase()}</td></tr>
      <tr><td>Stock Price (S)</td><td>${S.toFixed(4)}</td></tr>
      <tr><td>Strike Price (K)</td><td>${K.toFixed(4)}</td></tr>
      <tr><td>Risk-Free Rate (r)</td><td>${r.toFixed(4)}</td></tr>
      <tr><td>Time to Expiry (T)</td><td>${T.toFixed(4)}</td></tr>
      <tr><td>Market Price</td><td>${marketPrice.toFixed(4)}</td></tr>
      <tr><td>Implied Volatility</td><td>${(impliedVol * 100).toFixed(2)}%</td></tr>
      <tr><td>Model Price at IV</td><td>${finalPrice.toFixed(4)}</td></tr>
    </table>
  `;
}

function calculatePnL() {
  const entryPrice =
    Number(document.getElementById("entryPrice").value);

  const currentPrice =
    Number(document.getElementById("currentPrice").value);

  const contracts =
    Number(document.getElementById("contracts").value);

  const multiplier =
    Number(document.getElementById("multiplier").value);

  const profit =
    (currentPrice - entryPrice) *
    contracts *
    multiplier;

  const returnPct =
    ((currentPrice - entryPrice) /
      entryPrice) *
    100;

  const status =
    profit >= 0
      ? "Winning Position"
      : "Losing Position";

  document.getElementById("pnlResult").innerHTML = `
    <h3>P&L Result</h3>

    <table>
      <tr>
        <th>Metric</th>
        <th>Value</th>
      </tr>

      <tr>
        <td>Entry Price</td>
        <td>${entryPrice.toFixed(2)}</td>
      </tr>

      <tr>
        <td>Current Price</td>
        <td>${currentPrice.toFixed(2)}</td>
      </tr>

      <tr>
        <td>Contracts</td>
        <td>${contracts}</td>
      </tr>

      <tr>
        <td>Profit / Loss</td>
        <td>${profit.toFixed(2)}</td>
      </tr>

      <tr>
        <td>Return (%)</td>
        <td>${returnPct.toFixed(2)}%</td>
      </tr>

      <tr>
        <td>Breakeven</td>
        <td>${entryPrice.toFixed(2)}</td>
      </tr>

      <tr>
        <td>Status</td>
        <td>${status}</td>
      </tr>

    </table>
  `;
}



    async function sendMessage() {
      const messageBox = document.getElementById("message");
      const chatBox = document.getElementById("chat");
      const message = messageBox.value.trim();

      if (!message) return;

      conversation.push({
        role: "user",
        content: message
      });

      chatBox.innerHTML += `<div class="user"><strong>You:</strong><br>${message}</div>`;
      messageBox.value = "";
      scrollToBottom();

      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `<div class="ai" id="${loadingId}"><strong>AI:</strong><br>Loading...</div>`;
      scrollToBottom();

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          messages: conversation
        })
      });

      const data = await response.json();
      const aiReply = data.reply || data.error || "No reply";

      conversation.push({
        role: "assistant",
        content: aiReply
      });

      document.getElementById(loadingId).innerHTML =
        `<strong>AI:</strong><br>${marked.parse(aiReply)}`;

      scrollToBottom();
    }
  </script>
</body>
</html>
