<!DOCTYPE html>
<html>
<head>
  <title>Finance AI Chatbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #chat {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .ai {
      background: #f4f4f4;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <h1>Finance AI Chatbox</h1>

  <textarea id="message" placeholder="Ask a finance question..."></textarea>
  <br>

  <button onclick="sendMessage()">Send</button>

  <div id="chat" style="max-height:600px; overflow-y:auto;"></div>

  <script>
  window.onload = function () {

  document.getElementById("message").addEventListener("keydown", function(event) {

    if (event.key === "Enter" && !event.shiftKey) {

      event.preventDefault();

      sendMessage();

    }

  });

};

  async function sendMessage() {
      const messageBox = document.getElementById("message");
      const chatBox = document.getElementById("chat");
      const message = messageBox.value.trim();

      if (!message) return;

      chatBox.innerHTML += `<div class="user"><strong>You:</strong><br>${message}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      messageBox.value = "";

      const loadingId = "loading-" + Date.now();

      chatBox.innerHTML += `<div class="ai" id="${loadingId}"><strong>AI:</strong><br>Loading...</div>`;

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await response.json();

      document.getElementById(loadingId).innerHTML =
        `<strong>AI:</strong><br>${data.reply || data.error || "No reply"}`;
      
        chatBox.scrollTop = chatBox.scrollHeight;  

  }

  </script>
</body>
</html>
